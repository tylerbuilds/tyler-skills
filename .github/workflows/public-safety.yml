name: Public safety

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Run public safety audit
        run: ./scripts/audit-public-safety.sh
      - name: Install scanner CLIs
        run: ./scripts/setup-secret-scanners.sh
      - name: Run full secret scan
        run: ./scripts/secret-scan.sh
