name: Public safety

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run public safety audit
        run: ./scripts/audit-public-safety.sh
      - name: Run Gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:latest
        with:
          args: detect --source=/github/workspace --redact --verbose
      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.8
        with:
          path: ./
          base: ""
          head: HEAD
          extra_args: --results=verified,unknown
